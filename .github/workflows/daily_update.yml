name: Daily D-Score Update

on:
  schedule:
    - cron: '0 11 * * *'  # 6am ET / 7am EDT daily
  workflow_dispatch:       # also allows manual trigger from GitHub

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python dscore_pipeline.py

      - name: Commit updated rankings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dscore-site/dscore_rankings.json dscore_rankings.json
          git diff --staged --quiet || git commit -m "chore: update D-Score rankings $(date -u +%Y-%m-%d)"
          git push
